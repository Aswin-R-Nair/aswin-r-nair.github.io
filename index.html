<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aswin</title>
  <style>
    @font-face {
      font-family: 'Chakra Petch';
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url(fonts/chakra-petch-300.woff2) format('woff2');
    }
    @font-face {
      font-family: 'Chakra Petch';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url(fonts/chakra-petch-400.woff2) format('woff2');
    }
    @font-face {
      font-family: 'Chakra Petch';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url(fonts/chakra-petch-500.woff2) format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Chakra Petch', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      color: #e0e0e0;
      overflow: hidden;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    nav {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    nav a {
      color: #e0e0e0;
      text-decoration: none;
      border: 1px solid #333;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    nav a:hover { background: #222; }
    .text {
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1.6;
      font-size: 1.25rem;
      padding: 0 1.5rem;
    }
    @media (max-width: 480px) {
      .text {
        text-align: left;
        font-size: 1.1rem;
      }
      nav { gap: 0.6rem; }
      nav a { padding: 0.5rem 0.9rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <nav>
    <a href="https://github.com/aswin" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/aswin" target="_blank">LinkedIn</a>
    <a href="https://substack.com/@aswin" target="_blank">Substack</a>
  </nav>
  <div class="text">
    <p>hey im Aswin</p>
    <p>Im a developer who likes building things for the web</p>
  </div>
  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    let W, H, perimeter;
    const BAND_MIN = 10;
    const BAND_MAX = 50;
    const PARTICLE_COUNT = 150;
    const CURSOR_RADIUS = 60;
    const REPULSION_STRENGTH = 50;
    const CORNER_R = 40;

    let mouse = { x: -9999, y: -9999 };

    let seg = []; // segment lengths for rounded rect

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const r = CORNER_R;
      const arcLen = Math.PI * r / 2;
      const topLen = W - 2 * r;
      const rightLen = H - 2 * r;
      const bottomLen = W - 2 * r;
      const leftLen = H - 2 * r;
      // 8 segments: top, TR arc, right, BR arc, bottom, BL arc, left, TL arc
      seg = [topLen, arcLen, rightLen, arcLen, bottomLen, arcLen, leftLen, arcLen];
      perimeter = seg.reduce((a, b) => a + b, 0);
    }
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      mouse.x = t.clientX; mouse.y = t.clientY;
    }, { passive: true });
    window.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

    // Map t (0-1) along rounded-rect perimeter to (x, y) and inward normal
    function perimeterPoint(t) {
      let d = t * perimeter;
      const r = CORNER_R;
      let x, y, nx, ny;

      // Top edge (left to right)
      if (d < seg[0]) {
        x = r + d; y = 0; nx = 0; ny = 1;
        return { x, y, nx, ny };
      }
      d -= seg[0];

      // Top-right arc
      if (d < seg[1]) {
        const a = d / r; // 0 to π/2
        x = W - r + Math.sin(a) * r;
        y = r - Math.cos(a) * r;
        nx = -Math.sin(a); ny = Math.cos(a);
        return { x, y, nx, ny };
      }
      d -= seg[1];

      // Right edge (top to bottom)
      if (d < seg[2]) {
        x = W; y = r + d; nx = -1; ny = 0;
        return { x, y, nx, ny };
      }
      d -= seg[2];

      // Bottom-right arc
      if (d < seg[3]) {
        const a = d / r;
        x = W - r + Math.cos(a) * r;
        y = H - r + Math.sin(a) * r;
        nx = -Math.cos(a); ny = -Math.sin(a);
        return { x, y, nx, ny };
      }
      d -= seg[3];

      // Bottom edge (right to left)
      if (d < seg[4]) {
        x = W - r - d; y = H; nx = 0; ny = -1;
        return { x, y, nx, ny };
      }
      d -= seg[4];

      // Bottom-left arc
      if (d < seg[5]) {
        const a = d / r;
        x = r - Math.sin(a) * r;
        y = H - r + Math.cos(a) * r;
        nx = Math.sin(a); ny = -Math.cos(a);
        return { x, y, nx, ny };
      }
      d -= seg[5];

      // Left edge (bottom to top)
      if (d < seg[6]) {
        x = 0; y = H - r - d; nx = 1; ny = 0;
        return { x, y, nx, ny };
      }
      d -= seg[6];

      // Top-left arc
      {
        const a = d / r;
        x = r - Math.cos(a) * r;
        y = r - Math.sin(a) * r;
        nx = Math.cos(a); ny = Math.sin(a);
        return { x, y, nx, ny };
      }
    }

    // Create particles
    const particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        t: Math.random(),
        offset: BAND_MIN + Math.random() * (BAND_MAX - BAND_MIN),
        speed: 0.00015 + Math.random() * 0.0002,
        size: 1 + Math.random() * 2,
        opacity: 0.3 + Math.random() * 0.5,
      });
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);

      for (const p of particles) {
        // Advance clockwise
        p.t += p.speed;
        if (p.t > 1) p.t -= 1;

        const pt = perimeterPoint(p.t);

        // Base position offset inward from edge
        let px = pt.x + pt.nx * p.offset;
        let py = pt.y + pt.ny * p.offset;

        // Cursor repulsion
        const dx = px - mouse.x;
        const dy = py - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CURSOR_RADIUS && dist > 0) {
          const force = (1 - dist / CURSOR_RADIUS) * REPULSION_STRENGTH;
          px += (dx / dist) * force;
          py += (dy / dist) * force;
        }

        // Draw glow (cheap radial gradient instead of shadowBlur)
        ctx.save();
        ctx.globalAlpha = p.opacity * 0.25;
        ctx.fillStyle = '#999';
        ctx.beginPath();
        ctx.arc(px, py, p.size + 6, 0, Math.PI * 2);
        ctx.fill();

        // Draw core particle
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = '#aaa';
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
